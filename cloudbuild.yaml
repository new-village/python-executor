steps:
  # 1. Build the container image (Multi-tag with COMMIT_SHA and latest)
  - id: 'build-image'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest'
      - '.'

  # 2. Push images explicitly to Artifact Registry
  #    This is required because 'gcloud run jobs deploy' pulls the image during the build process.
  - id: 'push-images'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '-a' # Push all tags of the image
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}'

  # 3. Deploy/Update Cloud Run Job
  #    Use $COMMIT_SHA for the deployment to ensure we deploy exactly what was just built.
  - id: 'deploy-job'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - '${_JOB_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'

# 4. Automatically push images listed here to Artifact Registry (Backup and Metadata)
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest'

substitutions:
  _REGION: 'asia-northeast1'          # Artifact Registry & Cloud Run Job region
  _REPOSITORY: 'cloud-run-source-deploy'  # The name of your Artifact Registry repository
  _IMAGE_NAME: 'python-executor'      # The name of the built image
  _JOB_NAME: 'python-executor-job'    # The name of the Cloud Run Job

options:
  logging: CLOUD_LOGGING_ONLY
