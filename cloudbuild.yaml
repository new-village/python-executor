steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA', '.']
    
  # 2. Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA']

  # 3. Deploy/Update Cloud Run Job
  # Note: This updates the job configuration with the new image.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - '${_JOB_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--execute-now' # Deploy and immediately execute the job

substitutions:
  _REGION: 'asia-northeast1'          # Artifact Registry & Cloud Run Job region
  _REPOSITORY: 'cloud-run-source-deploy'             # The name of your Artifact Registry repository
  _IMAGE_NAME: 'python-executor'      # The name of the built image
  _JOB_NAME: 'python-executor-job'    # The name of the Cloud Run Job

options:
  logging: CLOUD_LOGGING_ONLY
